# =============================================================================
# 第 6 课：Secrets 密钥 与 Environments 环境
# =============================================================================
# Secret: 敏感信息（Token、密码、API Key），在日志中自动打码成 ***
# Variable: 非敏感配置，可以在流水线中引用
# Environment: 给部署环境加保护规则（审批、分支限制、专属 Secrets）

name: "06-进阶：密钥与环境"

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "部署到哪个环境？"
        type: choice
        options: ["staging", "production"]
        default: "staging"

jobs:
  # ========================================
  # 使用 Secrets 的示例
  # ========================================
  use-secrets:
    runs-on: ubuntu-latest
    steps:
      # Secret 的引用方式：${{ secrets.名称 }}
      # 注意：不能在 run 脚本里直接用 echo 打印 Secret 的值。
      # 但在日志中即使不小心泄露，GitHub 也会自动替换成 ***
      - name: "使用 Secret"
        env:
          # 把 Secret 设成环境变量，然后在脚本里用 $ 引用
          MY_API_KEY: ${{ secrets.MY_API_KEY }}
        run: |
          echo "API Key 的长度是: ${#MY_API_KEY}"
          # 如果你写了 echo "$MY_API_KEY"，日志里会显示 ***
          echo "（Secrets 在日志中会自动打码）"

  # ========================================
  # 使用 Variables 的示例
  # ========================================
  use-variables:
    runs-on: ubuntu-latest
    steps:
      - name: "使用 Variable"
        run: |
          # Variable 直接引用，不会被隐藏
          echo "部署区域: ${{ vars.DEPLOY_REGION }}"
          echo "团队名称: ${{ vars.TEAM_NAME }}"

  # ========================================
  # Environment（环境）—— 带保护规则的部署
  # ========================================
  # Environment 需要在 GitHub 网页端设置：
  #   Settings → Environments → 新建 "production"
  #   可以配置：审批人、等待时间、分支限制、专属 Secrets
  deploy:
    runs-on: ubuntu-latest
    # 引用环境。如果是 production，可能触发审批流程
    environment:
      name: ${{ github.event.inputs.deploy_target }}
      # url: 部署完成后在 Actions 页面显示一个链接
      url: https://${{ github.event.inputs.deploy_target }}.example.com
    steps:
      - name: "模拟部署"
        run: |
          echo "正在部署到 ${{ github.event.inputs.deploy_target }} 环境..."
          sleep 2
          echo "部署完成！"
          echo "访问地址: https://${{ github.event.inputs.deploy_target }}.example.com"

# =============================================================================
# 如何配置 Secrets 和 Variables？（需要在 GitHub 网页上操作）
#
# 【Secrets】
#   1. 打开 GitHub 仓库 → Settings → Secrets and variables → Actions
#   2. 点击 "New repository secret"
#   3. Name: MY_API_KEY / Value: xxxxx → Add secret
#
# 【Variables】
#   1. 同上路径，切换到 Variables 标签页
#   2. 点击 "New repository variable"
#   3. Name: DEPLOY_REGION / Value: us-east-1 → Add variable
#
# 【Environments】
#   1. 同上路径下的 Environments 链接（或 Settings → Environments）
#   2. 点击 "New environment"，名称填 production
#   3. 配置保护规则：
#      - Required reviewers: 指定审批人（生产环境必须）
#      - Wait timer: 等待 N 分钟后才执行
#      - Deployment branches: 限制哪些分支可以部署到此环境
#      - Environment secrets: 该环境专属的 Secret
# =============================================================================
