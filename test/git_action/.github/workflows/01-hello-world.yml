# =============================================================================
# 第 1 课：Hello World —— 认识 GitHub Actions 的基本骨架
# =============================================================================
# 一句话理解：在 .github/workflows/ 下放一个 .yml 文件，GitHub 就会自动识别
# 并按照你定义的"触发条件 → 任务 → 步骤"来执行。

# 流水线的显示名称（在 GitHub Actions 页面的左侧栏显示）
name: "01-入门：Hello World"

# =============================================================================
# on = 触发器。什么 GitHub 事件会启动这条流水线？
# =============================================================================
on:
  # push: 代码推送到仓库时触发
  push:
    branches: ["master", "main"]
  # workflow_dispatch: 允许在 GitHub 网页上手动点击按钮触发
  workflow_dispatch:

# =============================================================================
# jobs = 任务列表。每个 job 跑在一台独立的虚拟机（Runner）上。
# 多个 job 默认并行执行，除非你用 needs 指定依赖关系。
# =============================================================================
jobs:

  # ---- Job 的名字（可自定义） ----
  say-hello:
    # 选运行环境。ubuntu-latest 是 GitHub 托管的 Linux 虚拟机，免费。
    runs-on: ubuntu-latest

    # steps = 按顺序执行的步骤列表。每个步骤要么 run（跑脚本），要么 uses（用现成的 Action）。
    steps:
      # Step 1: 打印一行字
      - name: "打招呼"
        run: echo "Hello, GitHub Actions!"

      # Step 2: 多行脚本
      - name: "多行脚本"
        run: |
          echo "========================"
          echo "当前时间: $(date)"
          echo "当前用户: $(whoami)"
          echo "工作目录: $(pwd)"
          echo "========================"

      # Step 3: 使用 GitHub 内置的环境变量
      - name: "查看 GitHub 提供的环境变量"
        run: |
          echo "仓库: $GITHUB_REPOSITORY"
          echo "分支: $GITHUB_REF"
          echo "提交哈希: $GITHUB_SHA"
          echo "触发者: $GITHUB_ACTOR"
          echo "运行编号: $GITHUB_RUN_NUMBER"

# =============================================================================
# 核心概念小结:
#   Workflow  = .github/workflows/ 下的一个 .yml 文件
#   Event     = on: 定义的触发条件（push、PR、手动、定时等）
#   Job       = 一组在同一个虚拟机上顺序执行的步骤
#   Step      = 最小执行单元，可以是 run: 脚本 或 uses: 复用他人写的 Action
#   Runner    = 执行 Job 的虚拟机（ubuntu/windows/macos）
# =============================================================================
