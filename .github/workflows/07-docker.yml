# =============================================================================
# 第 7 课：Docker 集成 —— 构建镜像 + 推送到 Registry
# =============================================================================
# GitHub Actions 原生支持 Docker，无需额外配置。
# 常见场景：
#   1. 在容器里跑 CI（用 Docker 作为运行环境）
#   2. 构建 Docker 镜像并推送到 Docker Hub / GitHub Container Registry

name: "07-进阶：Docker 集成"

on:
  workflow_dispatch:

env:
  IMAGE_NAME: my-app

jobs:
  # ========================================
  # 场景 1：在 Docker 容器里跑 CI
  # ========================================
  ci-in-container:
    runs-on: ubuntu-latest
    # 启动一个服务容器（比如测试需要数据库）
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        # 端口映射
        ports:
          - 5432:5432
        # 健康检查 —— 等数据库就绪后再跑 CI
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # 用自定义 Docker 镜像作为运行环境
    container:
      image: node:20-alpine

    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npm test

  # ========================================
  # 场景 2：构建 Docker 镜像并推送
  # ========================================
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- 登录到 GitHub Container Registry ----
      # GitHub 会自动提供 GITHUB_TOKEN，无需手动创建
      - name: "登录 GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- 构建并推送镜像 ----
      # docker/build-push-action 是社区最流行的 Docker 构建 Action
      - name: "构建并推送 Docker 镜像"
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # 打标签：latest + commit SHA
          tags: |
            ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # 利用 GitHub Actions 缓存加速构建
          cache-from: type=gha
          cache-to: type=gha,mode=max

# =============================================================================
# 关键知识点:
#   1. services: → 启动辅助容器（数据库、Redis 等），Job 结束自动清理
#   2. container: → 指定 Job 在哪个 Docker 镜像中运行
#   3. ${{ secrets.GITHUB_TOKEN }} → GitHub 自动生成的临时 Token，无需配置
#   4. docker/login-action → 登录 Docker Registry
#   5. docker/build-push-action → 一站式构建+推送
#   6. cache-from/cache-to: type=gha → 用 GitHub Actions 缓存加速构建
# =============================================================================
